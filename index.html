      /* Override Tailwind Zinc colors to follow variables for instant theme flip */

      .group-hover\:text-apex-gold { color: #d4af37; }
      .hover\:text-apex-gold:hover { color: #d4af37 !important; }
      .hover\:bg-apex-gold:hover { background-color: #d4af37 !important; }
      .text-apex-gold { color: #d4af37 !important; }

      * { transition: background-color 0.2s ease, border-color 0.2s ease; }

        top: 0;
        left: 0;
        width: 100%;

        display: none;
        overflow: auto;
      }
